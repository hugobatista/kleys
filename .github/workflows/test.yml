name: test

on:
  push:
    branches: [master, main]
    paths:
      - '**.py'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

run-name: ${{ github.ref_name }} -> test ( ${{ github.run_attempt }} )

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Echo current date and time
        id: datetime
        run: |
          echo "datetime: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync dependencies
        run: uv sync --frozen --no-default-groups --group test

      - name: Run tests
        run: uv run hatch run test
