name: lint

on:
  push:
    branches: [master, main]
    paths:
      - '**.py'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

run-name: ${{ github.ref_name }} -> lint ( ${{ github.run_attempt }} )

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Echo current date and time
        id: datetime
        run: |
          echo "datetime: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync dependencies
        run: uv sync --frozen --only-group lint

      - name: Lint check
        run: uv run hatch run lint-check

      - name: Format check
        run: uv run hatch run format-check

      - name: Type check
        run: uv run hatch run typecheck
